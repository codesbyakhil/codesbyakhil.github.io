---
layout: default
---
<article class="post">
  <header class="page-head">
    <p class="eyebrow">{{ page.date | date: "%-d %B %Y" }}{% if page.tags and page.tags != empty %} &middot; {{ page.tags | join: " · " }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <p class="post-back"><a href="{{ '/blog/' | relative_url }}">&larr; All posts</a></p>
</article>
